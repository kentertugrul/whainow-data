            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            color: var(--grey);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://vjflwknbzdjkcnyzoiqb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqZmx3a25iemRqa2NueXpvaXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM1MDMzMTgsImV4cCI6MjA3OTA3OTMxOH0.l981Mraj_kh9ft3vI4ROaw8PWhqXJ2GBv8o9kJozRMY';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const categoryColors = {
            'Investor': { bg: 'rgba(200,149,108,0.15)', text: '#a06b3c' },
            'Advisory Board': { bg: 'rgba(26,107,90,0.12)', text: '#1a6b5a' },
            'Intro to Investors': { bg: 'rgba(42,90,154,0.1)', text: '#2a5a9a' },
            'Brings Participants': { bg: 'rgba(107,101,96,0.1)', text: '#6b6560' },
            'Financial Guy': { bg: 'rgba(196,68,68,0.1)', text: '#a03030' },
            'NGO / Partner': { bg: 'rgba(160,107,60,0.12)', text: '#7a5020' },
            'Charity Partnership': { bg: 'rgba(160,107,60,0.12)', text: '#7a5020' },
            'General': { bg: 'rgba(74,74,74,0.1)', text: '#4a4a4a' }
        };

        const Toast = ({ message, type = 'success', onExpire }) => {
            useEffect(() => {
                const timer = setTimeout(onExpire, 3000);
                return () => clearTimeout(timer);
            }, [onExpire]);

            return <div className={`toast ${type}`}>{message}</div>;
        };

        const ToastContainer = ({ toasts, onRemove }) => {
            return (
                <div className="toast-container">
                    {toasts.map((toast, idx) => (
                        <Toast
                            key={idx}
                            message={toast.message}
                            type={toast.type}
                            onExpire={() => onRemove(idx)}
                        />
                    ))}
                </div>
            );
        };

        const Dashboard = ({ leads, tasks, categories, principals }) => {
            const today = new Date().toISOString().split('T')[0];

            const totalLeads = leads.length;
            const pendingTasks = tasks.filter(t => ['pending', 'in_progress'].includes(t.status)).length;
            const followUpsDue = leads.filter(l => l.follow_up_date && l.follow_up_date <= today).length;
            const committed = leads.filter(l => l.status === 'committed').length;

            const statusCounts = {
                new: leads.filter(l => l.status === 'new').length,
                contacted: leads.filter(l => l.status === 'contacted').length,
                in_conversation: leads.filter(l => l.status === 'in_conversation').length,
                committed: leads.filter(l => l.status === 'committed').length,
                declined: leads.filter(l => l.status === 'declined').length,
            };

            const dueTasks = tasks.filter(t =>
                t.due_date &&
                t.due_date <= today &&
                ['pending', 'in_progress'].includes(t.status)
            );

            const dueFollowups = leads.filter(l =>
                l.follow_up_date &&
                l.follow_up_date <= today
            );

            return (
                <div className="tab-content">
                    <div className="dashboard-grid">
                        <div className="stat-card">
                            <div className="label">Total Leads</div>
                            <div className="value">{totalLeads}</div>
                        </div>
                        <div className="stat-card">
                            <div className="label">Pending Tasks</div>
                            <div className="value">{pendingTasks}</div>
                        </div>
                        <div className="stat-card">
                            <div className="label">Follow-ups Due</div>
                            <div className="value">{followUpsDue}</div>
                        </div>
                        <div className="stat-card">
                            <div className="label">Committed</div>
                            <div className="value">{committed}</div>
                        </div>
                    </div>

                    <div className="pipeline-bar">
                        <h3>Pipeline</h3>
                        <div className="pipeline-visual">
                            <div className="pipeline-segment new" style={{ flex: statusCounts.new || 1 }}>
                                {statusCounts.new > 0 ? `${statusCounts.new}` : ''}
                            </div>
                            <div className="pipeline-segment contacted" style={{ flex: statusCounts.contacted || 1 }}>
                                {statusCounts.contacted > 0 ? `${statusCounts.contacted}` : ''}
                            </div>
                            <div className="pipeline-segment in_conversation" style={{ flex: statusCounts.in_conversation || 1 }}>
                                {statusCounts.in_conversation > 0 ? `${statusCounts.in_conversation}` : ''}
                            </div>
                            <div className="pipeline-segment committed" style={{ flex: statusCounts.committed || 1 }}>
                                {statusCounts.committed > 0 ? `${statusCounts.committed}` : ''}
                            </div>
                            <div className="pipeline-segment declined" style={{ flex: statusCounts.declined || 1 }}>
                                {statusCounts.declined > 0 ? `${statusCounts.declined}` : ''}
                            </div>
                        </div>
                    </div>

                    <div className="section">
                        <h2>Today's Tasks</h2>
                        {dueTasks.length === 0 ? (
                            <div className="empty-state">
                                <p>No tasks due today</p>
                            </div>
                        ) : (
                            dueTasks.map(task => {
                                const lead = leads.find(l => l.id === task.lead_id);
                                const principal = principals.find(p => p.id === task.assigned_to);
                                return (
                                    <div key={task.id} className="task-item">
                                        <div className="task-item-content">
                                            <div className="task-item-title">{task.title}</div>
                                            <div className="task-item-meta">
                                                {lead && <span>Lead: {lead.name} | </span>}
                                                {principal && <span>Assigned: {principal.name}</span>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    <div className="section">
                        <h2>Follow-ups Due</h2>
                        {dueFollowups.length === 0 ? (
                            <div className="empty-state">
                                <p>No follow-ups due today</p>
                            </div>
                        ) : (
                            dueFollowups.map(lead => (
                                <div key={lead.id} className="followup-item">
                                    <div className="followup-item-content">
                                        <div className="followup-item-name">{lead.name}</div>
                                        <div className="followup-item-meta">
                                            {lead.categories && lead.categories.length > 0 && (
                                                <div className="lead-categories" style={{ marginTop: '0.5rem' }}>
                                                    {lead.categories.map((cat, i) => (
                                                        <span
                                                            key={i}
                                                            className="category-badge"
                                                            style={{
                                                                backgroundColor: categoryColors[cat.name]?.bg,
                                                                color: categoryColors[cat.name]?.text
                                                            }}
                                                        >
                                                            {cat.name}
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const AddLead = ({ categories, principals, onLeadAdded }) => {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                company: '',
                notes: '',
                priority: 5,
                selectedCategories: [],
                status: 'new'
            });

            const [loading, setLoading] = useState(false);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const toggleCategory = (catId) => {
                setFormData(prev => ({
                    ...prev,
                    selectedCategories: prev.selectedCategories.includes(catId)
                        ? prev.selectedCategories.filter(id => id !== catId)
                        : [...prev.selectedCategories, catId]
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.name.trim()) {
                    alert('Please enter a name');
                    return;
                }

                setLoading(true);
                try {
                    const futureDate = new Date();
                    futureDate.setDate(futureDate.getDate() + 7);

                    const { data: leadData, error: leadError } = await supabaseClient
                        .from('whainow_leads')
                        .insert({
                            name: formData.name,
                            email: formData.email || null,
                            phone: formData.phone || null,
                            company: formData.company || null,
                            notes: formData.notes || null,
                            priority: parseInt(formData.priority),
                            status: formData.status,
                            follow_up_date: futureDate.toISOString().split('T')[0],
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        })
                        .select();

                    if (leadError) throw leadError;
                    const leadId = leadData[0].id;

                    if (formData.selectedCategories.length > 0) {
                        const categoryInserts = formData.selectedCategories.map(catId => ({
                            lead_id: leadId,
                            category_id: catId
                        }));

                        const { error: catError } = await supabaseClient
                            .from('whainow_lead_categories')
                            .insert(categoryInserts);

                        if (catError) throw catError;
                    }

                    setFormData({
                        name: '',
                        email: '',
                        phone: '',
                        company: '',
                        notes: '',
                        priority: 5,
                        selectedCategories: [],
                        status: 'new'
                    });

                    onLeadAdded();
                } catch (error) {
                    console.error('Error adding lead:', error);
                }
                setLoading(false);
            };

            return (
                <div className="tab-content">
                    <div className="form-section">
                        <h2>Add New Lead</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Name *</label>
                                <input
                                    type="text"
                                    name="name"
                                    value={formData.name}
                                    onChange={handleInputChange}
                                    required
                                    style={{ fontSize: '1.2rem', fontWeight: '500' }}
                                />
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Email</label>
                                    <input
                                        type="email"
                                        name="email"
                                        value={formData.email}
                                        onChange={handleInputChange}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Phone</label>
                                    <input
                                        type="tel"
                                        name="phone"
                                        value={formData.phone}
                                        onChange={handleInputChange}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Company</label>
                                    <input
                                        type="text"
                                        name="company"
                                        value={formData.company}
                                        onChange={handleInputChange}
                                    />
                                </div>
                            </div>

                            <div className="form-group">
                                <label>Categories</label>
                                <div className="category-selector">
                                    {categories.map(cat => (
                                        <button
                                            key={cat.id}
                                            type="button"
                                            className={`category-tag ${formData.selectedCategories.includes(cat.id) ? 'selected' : ''}`}
                                            onClick={() => toggleCategory(cat.id)}
                                        >
                                            {cat.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Priority (1-9)</label>
                                    <input
                                        type="number"
                                        name="priority"
                                        min="1"
                                        max="9"
                                        value={formData.priority}
                                        onChange={handleInputChange}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Status</label>
                                    <select
                                        name="status"
                                        value={formData.status}
                                        onChange={handleInputChange}
                                    >
                                        <option value="new">New</option>
                                        <option value="contacted">Contacted</option>
                                        <option value="in_conversation">In Conversation</option>
                                        <option value="committed">Committed</option>
                                        <option value="declined">Declined</option>
                                        <option value="on_hold">On Hold</option>
                                    </select>
                                </div>
                            </div>

                            <div className="form-group textarea-group">
                                <label>Notes</label>
                                <textarea
                                    name="notes"
                                    value={formData.notes}
                                    onChange={handleInputChange}
                                />
                            </div>

                            <button type="submit" className="submit-btn" disabled={loading}>
                                {loading ? 'Saving...' : 'Save Lead'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const AllLeads = ({ leads, categories, principals, onDataUpdated }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('');
            const [filterStatus, setFilterStatus] = useState('');
            const [expandedTaskForm, setExpandedTaskForm] = useState(null);
            const [taskFormData, setTaskFormData] = useState({});
            const [editingLead, setEditingLead] = useState(null);
            const [editFormData, setEditFormData] = useState({});
            const [editSaving, setEditSaving] = useState(false);

            const filteredLeads = leads
                .filter(lead => lead.name.toLowerCase().includes(searchTerm.toLowerCase()))
                .filter(lead => !filterCategory || (lead.categories && lead.categories.some(c => c.id === parseInt(filterCategory))))
                .filter(lead => !filterStatus || lead.status === filterStatus)
                .sort((a, b) => (b.priority || 0) - (a.priority || 0));

            const handleAddTask = async (leadId) => {
                const data = taskFormData[leadId];
                if (!data || !data.title.trim()) {
                    alert('Please enter a task title');
                    return;
                }

                const dueDate = data.dueDate || new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                try {
                    const { error } = await supabaseClient
                        .from('whainow_tasks')
                        .insert({
                            title: data.title,
                            description: '',
                            status: 'pending',
                            priority: 5,
                            due_date: dueDate,
                            lead_id: leadId,
                            assigned_to: data.assignedTo || null,
                            created_at: new Date().toISOString()
                        });

                    if (error) throw error;
                    setExpandedTaskForm(null);
                    setTaskFormData(prev => {
                        const newData = { ...prev };
                        delete newData[leadId];
                        return newData;
                    });
                    onDataUpdated();
                } catch (error) {
                    console.error('Error adding task:', error);
                }
            };

            const handleStatusChange = async (leadId, newStatus) => {
                try {
                    const { error } = await supabaseClient
                        .from('whainow_leads')
                        .update({ status: newStatus, updated_at: new Date().toISOString() })
                        .eq('id', leadId);

                    if (error) throw error;
                    onDataUpdated();
                } catch (error) {
                    console.error('Error updating status:', error);
                }
            };

            const openEdit = (lead) => {
                setEditingLead(lead.id);
                setEditFormData({
                    name: lead.name || '',
                    email: lead.email || '',
                    phone: lead.phone || '',
                    company: lead.company || '',
                    notes: lead.notes || '',
                    status: lead.status || 'new',
                    priority: lead.priority || 5,
                    follow_up_date: lead.follow_up_date || '',
                    categoryIds: (lead.categories || []).map(c => c.id)
                });
                setExpandedTaskForm(null);
            };

            const toggleEditCategory = (catId) => {
                setEditFormData(prev => {
                    const ids = prev.categoryIds || [];
                    return {
                        ...prev,
                        categoryIds: ids.includes(catId)
                            ? ids.filter(id => id !== catId)
                            : [...ids, catId]
                    };
                });
            };

            const handleSaveEdit = async (leadId) => {
                if (!editFormData.name.trim()) {
                    alert('Name is required');
                    return;
                }
                setEditSaving(true);
                try {
                    // Update the lead record
                    const { error: updateErr } = await supabaseClient
                        .from('whainow_leads')
                        .update({
                            name: editFormData.name.trim(),
                            email: editFormData.email || null,
                            phone: editFormData.phone || null,
                            company: editFormData.company || null,
                            notes: editFormData.notes || null,
                            status: editFormData.status,
                            priority: parseInt(editFormData.priority) || 5,
                            follow_up_date: editFormData.follow_up_date || null,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', leadId);
                    if (updateErr) throw updateErr;

                    // Replace categories: delete all then re-insert
                    const { error: delErr } = await supabaseClient
                        .from('whainow_lead_categories')
                        .delete()
                        .eq('lead_id', leadId);
                    if (delErr) throw delErr;

                    if (editFormData.categoryIds && editFormData.categoryIds.length > 0) {
                        const catRows = editFormData.categoryIds.map(catId => ({
                            lead_id: leadId,
                            category_id: catId
                        }));
                        const { error: catErr } = await supabaseClient
                            .from('whainow_lead_categories')
                            .insert(catRows);
                        if (catErr) throw catErr;
                    }

                    setEditingLead(null);
                    setEditFormData({});
                    onDataUpdated();
                } catch (err) {
                    console.error('Error saving lead:', err);
                    alert('Error saving changes: ' + err.message);
                }
                setEditSaving(false);
            };

            const handleDeleteLead = async (leadId, leadName) => {
                if (!window.confirm(`Delete "${leadName}"? This will also remove all associated tasks and activity. This cannot be undone.`)) return;
                try {
                    const { error } = await supabaseClient
                        .from('whainow_leads')
                        .delete()
                        .eq('id', leadId);
                    if (error) throw error;
                    if (editingLead === leadId) setEditingLead(null);
                    onDataUpdated();
                } catch (err) {
                    console.error('Error deleting lead:', err);
                    alert('Error deleting lead: ' + err.message);
                }
            };

            return (
                <div className="tab-content">
                    <div className="filter-bar">
                        <input
                            type="text"
                            className="search-input"
                            placeholder="Search leads by name..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                        <select
                            className="filter-select"
                            value={filterCategory}
                            onChange={(e) => setFilterCategory(e.target.value)}
                        >
                            <option value="">All Categories</option>
                            {categories.map(cat => (
                                <option key={cat.id} value={cat.id}>{cat.name}</option>
                            ))}
                        </select>
                        <select
                            className="filter-select"
                            value={filterStatus}
                            onChange={(e) => setFilterStatus(e.target.value)}
                        >
                            <option value="">All Status</option>
                            <option value="new">New</option>
                            <option value="contacted">Contacted</option>
                            <option value="in_conversation">In Conversation</option>
                            <option value="committed">Committed</option>
                            <option value="declined">Declined</option>
                            <option value="on_hold">On Hold</option>
                        </select>
                    </div>

                    {filteredLeads.length === 0 ? (
                        <div className="empty-state">
                            <p>No leads found</p>
                        </div>
                    ) : (
                        <div className="leads-container">
                            {filteredLeads.map(lead => (
                                <div key={lead.id} className="lead-card">
                                    <div className="lead-name">{lead.name}</div>

                                    {lead.categories && lead.categories.length > 0 && (
                                        <div className="lead-categories">
                                            {lead.categories.map((cat, i) => (
                                                <span
                                                    key={i}
                                                    className="category-badge"
                                                    style={{
                                                        backgroundColor: categoryColors[cat.name]?.bg,
                                                        color: categoryColors[cat.name]?.text
                                                    }}
                                                >
                                                    {cat.name}
                                                </span>
                                            ))}
                                        </div>
                                    )}

                                    <div className="lead-meta">
                                        {lead.email && <div>Email: {lead.email}</div>}
                                        {lead.phone && <div>Phone: {lead.phone}</div>}
                                        {lead.company && <div>Company: {lead.company}</div>}
                                        {lead.follow_up_date && <div>Follow-up: {lead.follow_up_date}</div>}
                                    </div>

                                    <div style={{ marginBottom: '1rem' }}>
                                        <span className={`status-badge status-${lead.status}`}>
                                            {lead.status.replace('_', ' ')}
                                        </span>
                                        {lead.priority && (
                                            <span className="priority-badge" style={{ marginLeft: '0.5rem' }}>
                                                {lead.priority}
                                            </span>
                                        )}
                                    </div>

                                    {lead.notes && (
                                        <div className="lead-notes">{lead.notes.substring(0, 100)}{lead.notes.length > 100 ? '...' : ''}</div>
                                    )}

                                    <div className="lead-actions">
                                        <select
                                            className="filter-select"
                                            style={{ flex: 1 }}
                                            value={lead.status}
                                            onChange={(e) => handleStatusChange(lead.id, e.target.value)}
                                        >
                                            <option value="new">New</option>
                                            <option value="contacted">Contacted</option>
                                            <option value="in_conversation">In Conversation</option>
                                            <option value="committed">Committed</option>
                                            <option value="declined">Declined</option>
                                            <option value="on_hold">On Hold</option>
                                        </select>
                                        <button
                                            className="quick-btn"
                                            onClick={() => {
                                                setExpandedTaskForm(expandedTaskForm === lead.id ? null : lead.id);
                                                setEditingLead(null);
                                                setTaskFormData(prev => ({
                                                    ...prev,
                                                    [lead.id]: prev[lead.id] || { title: '', dueDate: '', assignedTo: '' }
                                                }));
                                            }}
                                        >
                                            + Task
                                        </button>
                                        <button
                                            className="quick-btn"
                                            style={{ background: editingLead === lead.id ? 'var(--accent)' : 'transparent', color: editingLead === lead.id ? 'var(--paper)' : 'var(--ink)' }}
                                            onClick={() => {
                                                if (editingLead === lead.id) {
                                                    setEditingLead(null);
                                                } else {
                                                    openEdit(lead);
                                                }
                                            }}
                                        >
                                            Edit
                                        </button>
                                        <button
                                            className="quick-btn"
                                            style={{ color: '#a03030', borderColor: 'rgba(160,48,48,0.3)' }}
                                            onClick={() => handleDeleteLead(lead.id, lead.name)}
                                        >
                                            ✕
                                        </button>
                                    </div>

                                    {expandedTaskForm === lead.id && (
                                        <div className="inline-task-form">
                                            <div className="form-group">
                                                <input
                                                    type="text"
                                                    placeholder="Task title"
                                                    value={taskFormData[lead.id]?.title || ''}
                                                    onChange={(e) => setTaskFormData(prev => ({
                                                        ...prev,
                                                        [lead.id]: { ...prev[lead.id], title: e.target.value }
                                                    }))}
                                                />
                                            </div>
                                            <div className="form-group">
                                                <input
                                                    type="date"
                                                    value={taskFormData[lead.id]?.dueDate || ''}
                                                    onChange={(e) => setTaskFormData(prev => ({
                                                        ...prev,
                                                        [lead.id]: { ...prev[lead.id], dueDate: e.target.value }
                                                    }))}
                                                />
                                            </div>
                                            <div className="form-group">
                                                <select
                                                    value={taskFormData[lead.id]?.assignedTo || ''}
                                                    onChange={(e) => setTaskFormData(prev => ({
                                                        ...prev,
                                                        [lead.id]: { ...prev[lead.id], assignedTo: e.target.value }
                                                    }))}
                                                >
                                                    <option value="">Unassigned</option>
                                                    {principals.map(p => (
                                                        <option key={p.id} value={p.id}>{p.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="inline-actions">
                                                <button
                                                    className="inline-btn submit"
                                                    onClick={() => handleAddTask(lead.id)}
                                                >
                                                    Save Task
                                                </button>
                                                <button
                                                    className="inline-btn cancel"
                                                    onClick={() => setExpandedTaskForm(null)}
                                                >
                                                    Cancel
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {editingLead === lead.id && (
                                        <div className="inline-task-form" style={{ marginTop: '1rem' }}>
                                            <div style={{ fontWeight: 600, fontSize: '0.8rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'var(--accent-dark)', marginBottom: '0.75rem' }}>
                                                Editing Lead
                                            </div>
                                            <div className="form-group">
                                                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Name *</label>
                                                <input
                                                    type="text"
                                                    value={editFormData.name || ''}
                                                    onChange={(e) => setEditFormData(prev => ({ ...prev, name: e.target.value }))}
                                                    placeholder="Full name"
                                                    style={{ width: '100%', marginTop: '0.25rem' }}
                                                />
                                            </div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem' }}>
                                                <div className="form-group">
                                                    <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Email</label>
                                                    <input
                                                        type="email"
                                                        value={editFormData.email || ''}
                                                        onChange={(e) => setEditFormData(prev => ({ ...prev, email: e.target.value }))}
                                                        placeholder="email@example.com"
                                                        style={{ width: '100%', marginTop: '0.25rem' }}
                                                    />
                                                </div>
                                                <div className="form-group">
                                                    <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Phone</label>
                                                    <input
                                                        type="text"
                                                        value={editFormData.phone || ''}
                                                        onChange={(e) => setEditFormData(prev => ({ ...prev, phone: e.target.value }))}
                                                        placeholder="+44 ..."
                                                        style={{ width: '100%', marginTop: '0.25rem' }}
                                                    />
                                                </div>
                                            </div>
                                            <div className="form-group">
                                                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Company / Organisation</label>
                                                <input
                                                    type="text"
                                                    value={editFormData.company || ''}
                                                    onChange={(e) => setEditFormData(prev => ({ ...prev, company: e.target.value }))}
                                                    style={{ width: '100%', marginTop: '0.25rem' }}
                                                />
                                            </div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '0.75rem' }}>
                                                <div className="form-group">
                                                    <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Status</label>
                                                    <select
                                                        value={editFormData.status || 'new'}
                                                        onChange={(e) => setEditFormData(prev => ({ ...prev, status: e.target.value }))}
                                                        style={{ width: '100%', marginTop: '0.25rem' }}
                                                    >
                                                        <option value="new">New</option>
                                                        <option value="contacted">Contacted</option>
                                                        <option value="in_conversation">In Conversation</option>
                                                        <option value="committed">Committed</option>
                                                        <option value="declined">Declined</option>
                                                        <option value="on_hold">On Hold</option>
                                                    </select>
                                                </div>
                                                <div className="form-group">
                                                    <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Priority (1–9)</label>
                                                    <input
                                                        type="number"
                                                        min="1" max="9"
                                                        value={editFormData.priority || 5}
                                                        onChange={(e) => setEditFormData(prev => ({ ...prev, priority: e.target.value }))}
                                                        style={{ width: '100%', marginTop: '0.25rem' }}
                                                    />
                                                </div>
                                                <div className="form-group">
                                                    <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Follow-up</label>
                                                    <input
                                                        type="date"
                                                        value={editFormData.follow_up_date || ''}
                                                        onChange={(e) => setEditFormData(prev => ({ ...prev, follow_up_date: e.target.value }))}
                                                        style={{ width: '100%', marginTop: '0.25rem' }}
                                                    />
                                                </div>
                                            </div>
                                            <div className="form-group">
                                                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Notes</label>
                                                <textarea
                                                    value={editFormData.notes || ''}
                                                    onChange={(e) => setEditFormData(prev => ({ ...prev, notes: e.target.value }))}
                                                    rows={3}
                                                    style={{ width: '100%', marginTop: '0.25rem', padding: '0.5rem', border: '1px solid var(--warm)', borderRadius: '4px', fontFamily: "'DM Sans', sans-serif", fontSize: '0.85rem', resize: 'vertical' }}
                                                />
                                            </div>
                                            <div className="form-group">
                                                <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--grey)', textTransform: 'uppercase', letterSpacing: '0.04em', display: 'block', marginBottom: '0.4rem' }}>Categories</label>
                                                <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap' }}>
                                                    {categories.map(cat => {
                                                        const selected = (editFormData.categoryIds || []).includes(cat.id);
                                                        return (
                                                            <button
                                                                key={cat.id}
                                                                type="button"
                                                                onClick={() => toggleEditCategory(cat.id)}
                                                                style={{
                                                                    padding: '0.3rem 0.7rem',
                                                                    borderRadius: '3px',
                                                                    border: selected ? '2px solid var(--accent)' : '1px solid var(--warm)',
                                                                    background: selected ? 'rgba(200,149,108,0.15)' : 'transparent',
                                                                    color: selected ? 'var(--accent-dark)' : 'var(--grey)',
                                                                    cursor: 'pointer',
                                                                    fontSize: '0.78rem',
                                                                    fontWeight: selected ? 600 : 400,
                                                                    transition: 'all 0.15s'
                                                                }}
                                                            >
                                                                {cat.name}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                            <div className="inline-actions">
                                                <button
                                                    className="inline-btn submit"
                                                    onClick={() => handleSaveEdit(lead.id)}
                                                    disabled={editSaving}
                                                >
                                                    {editSaving ? 'Saving…' : 'Save Changes'}
                                                </button>
                                                <button
                                                    className="inline-btn cancel"
                                                    onClick={() => { setEditingLead(null); setEditFormData({}); }}
                                                >
                                                    Cancel
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const Documents = ({ documents, leads, onDataUpdated }) => {
            const [formData, setFormData] = useState({
                title: '',
                doc_type: 'general',
                version: '1.0',
                author: '',
                tags: [],
                lead_id: '',
                notes: '',
                file: null,
                content: ''
            });

            const [tagInput, setTagInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editFormData, setEditFormData] = useState({});
            const [viewingDoc, setViewingDoc] = useState(null);
            const [viewContent, setViewContent] = useState('');

            const docTypes = ['html', 'pdf', 'deck', 'spreadsheet', 'memo', 'proposal', 'contract', 'legal', 'financial', 'general'];

            const typeColors = {
                html: '#2a5a9a',
                pdf: '#a03030',
                deck: '#c8956c',
                spreadsheet: '#1a6b5a',
                memo: '#6b6560',
                proposal: '#a06b3c',
                contract: '#7a5020',
                legal: '#4a4a4a',
                financial: '#a03030',
                general: '#6b6560'
            };

            const filteredDocuments = documents
                .filter(doc => doc.title.toLowerCase().includes(searchTerm.toLowerCase()))
                .filter(doc => !filterType || doc.doc_type === filterType)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const formatDate = (dateString) => {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            };

            const addTag = () => {
                if (tagInput.trim() && !formData.tags.includes(tagInput.trim())) {
                    setFormData(prev => ({
                        ...prev,
                        tags: [...prev.tags, tagInput.trim()]
                    }));
                    setTagInput('');
                }
            };

            const removeTag = (tag) => {
                setFormData(prev => ({
                    ...prev,
                    tags: prev.tags.filter(t => t !== tag)
                }));
            };

            const handleFileChange = (e) => {
                setFormData(prev => ({
                    ...prev,
                    file: e.target.files[0]
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.title.trim()) {
                    alert('Please enter a title');
                    return;
                }

                setLoading(true);
                try {
                    let fileUrl = null;

                    if (formData.file) {
                        const { data, error: uploadError } = await supabaseClient.storage
                            .from('whainow-docs')
                            .upload(`documents/${Date.now()}-${formData.file.name}`, formData.file);

                        if (uploadError) throw uploadError;

                        const { data: publicUrlData } = supabaseClient.storage
                            .from('whainow-docs')
                            .getPublicUrl(data.path);

                        fileUrl = publicUrlData.publicUrl;
                    }

                    const { error } = await supabaseClient
                        .from('whainow_documents')
                        .insert({
                            title: formData.title,
                            doc_type: formData.doc_type,
                            version: formData.version,
                            author: formData.author || null,
                            tags: formData.tags.length > 0 ? formData.tags : null,
                            lead_id: formData.lead_id ? parseInt(formData.lead_id) : null,
                            notes: formData.notes || null,
                            file_url: fileUrl,
                            content: formData.content || null,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        });

                    if (error) throw error;

                    setFormData({
                        title: '',
                        doc_type: 'general',
                        version: '1.0',
                        author: '',
                        tags: [],
                        lead_id: '',
                        notes: '',
                        file: null,
                        content: ''
                    });

                    onDataUpdated();
                } catch (error) {
                    console.error('Error saving document:', error);
                    alert('Error saving document: ' + error.message);
                }
                setLoading(false);
            };

            const handleEdit = (doc) => {
                setEditingId(doc.id);
                setEditFormData({
                    ...doc,
                    tags: doc.tags || []
                });
            };

            const handleSaveEdit = async () => {
                try {
                    const { error } = await supabaseClient
                        .from('whainow_documents')
                        .update({
                            title: editFormData.title,
                            version: editFormData.version,
                            notes: editFormData.notes,
                            tags: editFormData.tags.length > 0 ? editFormData.tags : null,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', editingId);

                    if (error) throw error;
                    setEditingId(null);
                    onDataUpdated();
                } catch (error) {
                    console.error('Error updating document:', error);
                    alert('Error updating document: ' + error.message);
                }
            };

            const handleNewVersion = async (doc) => {
                try {
                    const newVersion = (parseFloat(doc.version) + 0.1).toFixed(1);
                    const { error } = await supabaseClient
                        .from('whainow_documents')
                        .insert({
                            title: doc.title,
                            doc_type: doc.doc_type,
                            version: newVersion,
                            author: doc.author,
                            tags: doc.tags,
                            lead_id: doc.lead_id,
                            notes: doc.notes,
                            file_url: doc.file_url,
                            content: doc.content,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        });

                    if (error) throw error;
                    onDataUpdated();
                } catch (error) {
                    console.error('Error creating new version:', error);
                    alert('Error creating new version: ' + error.message);
                }
            };

            const handleViewDocument = (doc) => {
                setViewingDoc(doc);
                if (doc.file_url) {
                    setViewContent('');
                } else if (doc.content) {
                    setViewContent(doc.content);
                }
            };

            const DocumentCard = ({ doc }) => {
                const linkedLead = doc.lead_id ? leads.find(l => l.id === doc.lead_id) : null;
                const isEditing = editingId === doc.id;

                return (
                    <div className="document-card">
                        {isEditing ? (
                            <div className="edit-form">
                                <div className="form-group">
                                    <label>Title</label>
                                    <input
                                        type="text"
                                        value={editFormData.title}
                                        onChange={(e) => setEditFormData(prev => ({ ...prev, title: e.target.value }))}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Version</label>
                                    <input
                                        type="text"
                                        value={editFormData.version}
                                        onChange={(e) => setEditFormData(prev => ({ ...prev, version: e.target.value }))}
                                    />
                                </div>
                                <div className="form-group textarea-group">
                                    <label>Notes</label>
                                    <textarea
                                        value={editFormData.notes || ''}
                                        onChange={(e) => setEditFormData(prev => ({ ...prev, notes: e.target.value }))}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Tags</label>
                                    <div className="document-tags">
                                        {editFormData.tags?.map((tag, i) => (
                                            <div key={i} className="tag-pill">
                                                {tag}
                                                <button
                                                    type="button"
                                                    onClick={() => setEditFormData(prev => ({
                                                        ...prev,
                                                        tags: prev.tags.filter((_, idx) => idx !== i)
                                                    }))}
                                                    style={{ marginLeft: '0.35rem', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink)' }}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="inline-actions">
                                    <button
                                        type="button"
                                        className="inline-btn submit"
                                        onClick={handleSaveEdit}
                                    >
                                        Save
                                    </button>
                                    <button
                                        type="button"
                                        className="inline-btn cancel"
                                        onClick={() => setEditingId(null)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className="document-header">
                                    <div className="document-title">{doc.title}</div>
                                    <div className="document-badges">
                                        <div
                                            className={`doc-type-badge doc-type-${doc.doc_type}`}
                                        >
                                            {doc.doc_type}
                                        </div>
                                        <div className="version-badge">v{doc.version}</div>
                                    </div>
                                </div>

                                <div className="document-meta">
                                    {doc.author && (
                                        <div className="meta-item">
                                            <div className="meta-label">Author</div>
                                            <div className="meta-value">{doc.author}</div>
                                        </div>
                                    )}
                                    <div className="meta-item">
                                        <div className="meta-label">Created</div>
                                        <div className="meta-value">{formatDate(doc.created_at)}</div>
                                    </div>
                                    <div className="meta-item">
                                        <div className="meta-label">Updated</div>
                                        <div className="meta-value">{formatDate(doc.updated_at)}</div>
                                    </div>
                                    {linkedLead && (
                                        <div className="meta-item">
                                            <div className="meta-label">Linked Lead</div>
                                            <div className="meta-value">{linkedLead.name}</div>
                                        </div>
                                    )}
                                </div>

                                {doc.tags && doc.tags.length > 0 && (
                                    <div className="document-tags">
                                        {doc.tags.map((tag, i) => (
                                            <div key={i} className="tag-pill">{tag}</div>
                                        ))}
                                    </div>
                                )}

                                {doc.notes && (
                                    <div className="document-notes document-notes-preview">{doc.notes}</div>
                                )}

                                <div className="document-actions">
                                    <button
                                        className="doc-btn primary"
                                        onClick={() => handleViewDocument(doc)}
                                    >
                                        View
                                    </button>
                                    <button
                                        className="doc-btn"
                                        onClick={() => handleEdit(doc)}
                                    >
                                        Edit
                                    </button>
                                    <button
                                        className="doc-btn"
                                        onClick={() => handleNewVersion(doc)}
                                    >
                                        New Version
                                    </button>
                                </div>
                            </>
                        )}
                    </div>
                );
            };

            return (
                <div className="tab-content">
                    <div className="documents-container">
                        <div className="form-section">
                            <h2>Add Document</h2>
                            <form onSubmit={handleSubmit}>
                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Title *</label>
                                        <input
                                            type="text"
                                            value={formData.title}
                                            onChange={(e) => setFormData(prev => ({ ...prev, title: e.target.value }))}
                                            required
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Type</label>
                                        <select
                                            value={formData.doc_type}
                                            onChange={(e) => setFormData(prev => ({ ...prev, doc_type: e.target.value }))}
                                        >
                                            {docTypes.map(type => (
                                                <option key={type} value={type}>{type}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="form-group">
                                        <label>Version</label>
                                        <input
                                            type="text"
                                            value={formData.version}
                                            onChange={(e) => setFormData(prev => ({ ...prev, version: e.target.value }))}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Author</label>
                                        <input
                                            type="text"
                                            value={formData.author}
                                            onChange={(e) => setFormData(prev => ({ ...prev, author: e.target.value }))}
                                        />
                                    </div>
                                </div>

                                <div className="form-row">
                                    <div className="form-group">
                                        <label>Link to Lead</label>
                                        <select
                                            value={formData.lead_id}
                                            onChange={(e) => setFormData(prev => ({ ...prev, lead_id: e.target.value }))}
                                        >
                                            <option value="">None</option>
                                            {leads.map(lead => (
                                                <option key={lead.id} value={lead.id}>{lead.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                <div className="form-group">
                                    <label>Tags (comma-separated)</label>
                                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                                        <input
                                            type="text"
                                            value={tagInput}
                                            onChange={(e) => setTagInput(e.target.value)}
                                            onKeyPress={(e) => {
                                                if (e.key === 'Enter') {
                                                    e.preventDefault();
                                                    addTag();
                                                }
                                            }}
                                            placeholder="Enter tag and press Enter"
                                        />
                                        <button
                                            type="button"
                                            className="quick-btn"
                                            onClick={addTag}
                                        >
                                            Add
                                        </button>
                                    </div>
                                    <div className="document-tags">
                                        {formData.tags.map((tag, i) => (
                                            <div key={i} className="tag-pill">
                                                {tag}
                                                <button
                                                    type="button"
                                                    onClick={() => removeTag(tag)}
                                                    style={{ marginLeft: '0.35rem', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink)' }}
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="form-group textarea-group">
                                    <label>Notes</label>
                                    <textarea
                                        value={formData.notes}
                                        onChange={(e) => setFormData(prev => ({ ...prev, notes: e.target.value }))}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Upload File</label>
                                    <div className="file-upload-area" onClick={() => document.getElementById('file-input').click()}>
                                        {formData.file ? (
                                            <div>
                                                <div style={{ fontWeight: 600, marginBottom: '0.5rem' }}>File selected:</div>
                                                <div style={{ fontSize: '0.9rem', color: 'var(--grey)' }}>{formData.file.name}</div>
                                            </div>
                                        ) : (
                                            <div>
                                                <div style={{ fontWeight: 600, marginBottom: '0.5rem' }}>Click to upload or drag and drop</div>
                                                <div style={{ fontSize: '0.85rem', color: 'var(--grey)' }}>PDF, HTML, or other documents</div>
                                            </div>
                                        )}
                                        <input
                                            id="file-input"
                                            type="file"
                                            onChange={handleFileChange}
                                        />
                                    </div>
                                </div>
