        const Tasks = ({ tasks, leads, categories, principals, onDataUpdated }) => {
            const [newTask, setNewTask] = useState({
                title: '',
                description: '',
                leadId: '',
                assignedTo: '',
                dueDate: '',
                priority: 5
            });

            const [loading, setLoading] = useState(false);

            const pendingTasks = tasks.filter(t => t.status === 'pending').sort((a, b) => (b.priority || 0) - (a.priority || 0));
            const inProgressTasks = tasks.filter(t => t.status === 'in_progress').sort((a, b) => (b.priority || 0) - (a.priority || 0));
            const doneTasks = tasks.filter(t => t.status === 'done').sort((a, b) => (b.priority || 0) - (a.priority || 0));

            const handleAddTask = async (e) => {
                e.preventDefault();
                if (!newTask.title.trim()) {
                    alert('Please enter a task title');
                    return;
                }

                const futureDate = newTask.dueDate || new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                setLoading(true);
                try {
                    const { error } = await supabaseClient
                        .from('whainow_tasks')
                        .insert({
                            title: newTask.title,
                            description: newTask.description,
                            status: 'pending',
                            priority: parseInt(newTask.priority),
                            due_date: futureDate,
                            lead_id: newTask.leadId || null,
                            assigned_to: newTask.assignedTo || null,
                            created_at: new Date().toISOString()
                        });

                    if (error) throw error;

                    setNewTask({
                        title: '',
                        description: '',
                        leadId: '',
                        assignedTo: '',
                        dueDate: '',
                        priority: 5
                    });

                    onDataUpdated();
                } catch (error) {
                    console.error('Error adding task:', error);
                }
                setLoading(false);
            };

            const handleTaskStatusChange = async (taskId, newStatus) => {
                try {
                    const { error } = await supabaseClient
                        .from('whainow_tasks')
                        .update({ status: newStatus })
                        .eq('id', taskId);

                    if (error) throw error;
                    onDataUpdated();
                } catch (error) {
                    console.error('Error updating task:', error);
                }
            };

            const [draggedTaskId, setDraggedTaskId] = useState(null);

            const handleDragStart = (e, taskId) => {
                setDraggedTaskId(taskId);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', taskId);
                e.currentTarget.style.opacity = '0.5';
            };

            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
                setDraggedTaskId(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            const handleDragEnter = (e) => {
                e.preventDefault();
                e.currentTarget.classList.add('drag-over');
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('drag-over');
            };

            const handleDrop = (e, newStatus) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                const taskId = e.dataTransfer.getData('text/plain');
                if (taskId) {
                    handleTaskStatusChange(taskId, newStatus);
                }
            };

            const TaskCard = ({ task }) => {
                const lead = leads.find(l => l.id === task.lead_id);
                const principal = principals.find(p => p.id === task.assigned_to);

                return (
                    <div
                        className="task-card"
                        draggable
                        onDragStart={(e) => handleDragStart(e, task.id)}
                        onDragEnd={handleDragEnd}
                        style={{ cursor: 'grab' }}
                    >
                        <div className="task-card-title">{task.title}</div>
                        <div className="task-card-meta">
                            {lead && <div>Lead: {lead.name}</div>}
                            {principal && <div>Assigned: {principal.name}</div>}
                            {task.due_date && <div>Due: {task.due_date}</div>}
                        </div>
                        <select
                            value={task.status}
                            onChange={(e) => handleTaskStatusChange(task.id, e.target.value)}
                            className="filter-select"
                            style={{ width: '100%', marginTop: '0.5rem' }}
                        >
                            <option value="pending">Pending</option>
                            <option value="in_progress">In Progress</option>
                            <option value="done">Done</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                );
            };

            const TaskColumn = ({ status, title, taskList }) => (
                <div
                    className={`task-column ${status}`}
                    onDragOver={handleDragOver}
                    onDragEnter={handleDragEnter}
                    onDragLeave={handleDragLeave}
                    onDrop={(e) => handleDrop(e, status)}
                >
                    <h3>{title} ({taskList.length})</h3>
                    {taskList.length === 0 ? (
                        <div style={{ color: 'var(--grey)', fontSize: '0.9rem', padding: '1rem 0' }}>
                            Drop tasks here
                        </div>
                    ) : (
                        taskList.map(task => <TaskCard key={task.id} task={task} />)
                    )}
                </div>
            );

            return (
                <div className="tab-content">
                    <div className="form-section">
                        <h2>Add Task</h2>
                        <form onSubmit={handleAddTask}>
                            <div className="form-group">
                                <label>Task Title *</label>
                                <input
                                    type="text"
                                    value={newTask.title}
                                    onChange={(e) => setNewTask(prev => ({ ...prev, title: e.target.value }))}
                                    required
                                />
                            </div>

                            <div className="form-group textarea-group">
                                <label>Description</label>
                                <textarea
                                    value={newTask.description}
                                    onChange={(e) => setNewTask(prev => ({ ...prev, description: e.target.value }))}
                                />
                            </div>

                            <div className="form-row">
                                <div className="form-group">
                                    <label>Link to Lead</label>
                                    <select
                                        value={newTask.leadId}
                                        onChange={(e) => setNewTask(prev => ({ ...prev, leadId: e.target.value }))}
                                    >
                                        <option value="">None</option>
                                        {leads.map(lead => (
                                            <option key={lead.id} value={lead.id}>{lead.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Assign To</label>
                                    <select
                                        value={newTask.assignedTo}
                                        onChange={(e) => setNewTask(prev => ({ ...prev, assignedTo: e.target.value }))}
                                    >
                                        <option value="">Unassigned</option>
                                        {principals.map(p => (
                                            <option key={p.id} value={p.id}>{p.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label>Due Date</label>
                                    <input
                                        type="date"
                                        value={newTask.dueDate}
                                        onChange={(e) => setNewTask(prev => ({ ...prev, dueDate: e.target.value }))}
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Priority (1-9)</label>
                                    <input
                                        type="number"
                                        min="1"
                                        max="9"
                                        value={newTask.priority}
                                        onChange={(e) => setNewTask(prev => ({ ...prev, priority: e.target.value }))}
                                    />
                                </div>
                            </div>

                            <button type="submit" className="submit-btn" disabled={loading}>
                                {loading ? 'Saving...' : 'Add Task'}
                            </button>
                        </form>
                    </div>

                    <div className="tasks-columns">
                        <TaskColumn status="pending" title="Pending" taskList={pendingTasks} />
                        <TaskColumn status="in_progress" title="In Progress" taskList={inProgressTasks} />
                        <TaskColumn status="done" title="Done" taskList={doneTasks} />
                    </div>
                </div>
            );
        };

        // ============================================================
        // PASSWORD GATE with persistent cookie session
        // ============================================================
        const APP_PASSWORD = 'whainow';
        const COOKIE_NAME = 'whainow_auth';
        const COOKIE_DAYS = 90; // Session persists for 90 days

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + '=' + value + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
        }

        const PasswordGate = ({ onAuthenticated }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);
            const [shaking, setShaking] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === APP_PASSWORD) {
                    setCookie(COOKIE_NAME, 'authenticated', COOKIE_DAYS);
                    onAuthenticated();
                } else {

                    setShaking(true);
                    setTimeout(() => setShaking(false), 500);
                    setPassword('');

            };

            return (
                <div style={{
                    minHeight: '100vh',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    background: 'var(--ink)',
                    fontFamily: "'DM Sans', sans-serif"
                }}>
                    <div style={{
                        background: 'rgba(255,255,255,0.03)',
                        border: '1px solid rgba(255,255,255,0.08)',

                        animation: shaking ? 'shake 0.5s ease' : 'fadeIn 0.6s ease'
                    }}>
                        <div style={{
                            fontFamily: "'JetBrains Mono', monospace",
                            fontSize: '0.65rem',
                            letterSpacing: '0.2em',
                            textTransform: 'uppercase',
                            color: 'var(--accent)',
                            marginBottom: '1rem'
                        }}>whainow · outreach pipeline</div>
                        <h1 style={{
                            fontFamily: "'Instrument Serif', Georgia, serif",
                            fontSize: '1.8rem',
                            fontWeight: 400,
                            color: 'var(--paper)',
                            marginBottom: '0.5rem'
                        }}>Access <em style={{ fontStyle: 'italic', color: 'var(--accent)' }}>required</em></h1>
                        <p style={{
                            fontSize: '0.85rem',
                            color: 'var(--grey-light)',
                            marginBottom: '2rem',
                            fontWeight: 300
                        }}>Enter the password to continue</p>
                        <form onSubmit={handleSubmit}>
                            <input
                                type="password"
                                value={password}
                                onChange={(e) => { setPassword(e.target.value); setError(false); }}
                                placeholder="Password"
                                autoFocus
                                style={{
                                    width: '100%',
                                    padding: '14px 16px',
                                    fontSize: '15px',
                                    fontFamily: "'DM Sans', sans-serif",
                                    background: 'rgba(255,255,255,0.06)',
                                    border: error ? '1px solid #a03030' : '1px solid rgba(255,255,255,0.12)',
                                    borderRadius: '3px',
                                    color: 'var(--paper)',
                                    outline: 'none',
                                    marginBottom: '1rem',
                                    transition: 'border-color 0.2s'
                                }}
                            />
                            {error && (
                                <p style={{ color: '#a03030', fontSize: '0.8rem', marginBottom: '1rem' }}>
                                    Incorrect password
                                </p>
                            )}
                            <button type="submit" style={{
                                width: '100%',
                                padding: '14px',
                                background: 'var(--accent)',
                                color: 'var(--ink)',
                                border: 'none',
                                borderRadius: '3px',
                                fontSize: '0.75rem',
                                fontWeight: 600,
                                letterSpacing: '0.1em',
                                textTransform: 'uppercase',
                                cursor: 'pointer',
                                fontFamily: "'DM Sans', sans-serif",
                                transition: 'background 0.2s'
                            }}>Enter</button>
                        </form>
                    </div>
                    <style>{`
                        @keyframes shake {
                            0%, 100% { transform: translateX(0); }
                            25% { transform: translateX(-8px); }
                            50% { transform: translateX(8px); }
                            75% { transform: translateX(-4px); }
                        }
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                    `}</style>
                </div>
            );
        };

        // ── Graph View + Obsidian Export ──────────────────────────────────
        const GraphView = ({ leads, categories, tasks }) => {
            const svgRef = useRef(null);
            const [selectedNode, setSelectedNode] = useState(null);

            useEffect(() => {
                if (!svgRef.current) return;
                const d3 = window.d3;
                const svg = d3.select(svgRef.current);
                svg.selectAll('*').remove();

                const container = svgRef.current.parentElement;
                const width = container.clientWidth || 800;
                const height = 600;
                svg.attr('viewBox', `0 0 ${width} ${height}`);

                // Build node and link arrays
                const nodes = [];
                const links = [];

                leads.forEach(lead => {
                    nodes.push({ id: `lead-${lead.id}`, type: 'lead', name: lead.name, data: lead });
                });
                categories.forEach(cat => {
                    nodes.push({ id: `cat-${cat.id}`, type: 'category', name: cat.name, data: cat });
                });
                leads.forEach(lead => {
                    (lead.categories || []).forEach(cat => {
                        links.push({ source: `lead-${lead.id}`, target: `cat-${cat.id}` });
                    });
                });

                if (nodes.length === 0) return;

                // Zoom/pan container
                const g = svg.append('g');
                svg.call(
                    d3.zoom().scaleExtent([0.25, 4]).on('zoom', (event) => {
                        g.attr('transform', event.transform);
                    })
                );

                // Force simulation
                const simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links).id(d => d.id).distance(130).strength(0.6))
                    .force('charge', d3.forceManyBody().strength(-380))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide(45));

                // Links
                const link = g.append('g')
                    .attr('class', 'graph-links')
                    .selectAll('line')
                    .data(links)
                    .join('line')
                    .attr('stroke', '#e0d8d0')
                    .attr('stroke-width', 1.5)
                    .attr('stroke-dasharray', '4 2');

                // Node groups
                const node = g.append('g')
                    .attr('class', 'graph-nodes')
                    .selectAll('g')
                    .data(nodes)
                    .join('g')
                    .attr('cursor', 'pointer')
                    .on('click', (event, d) => {
                        event.stopPropagation();
                        setSelectedNode(prev => prev && prev.id === d.id ? null : d);
                    })
                    .call(
                        d3.drag()
                            .on('start', (event, d) => {
                                if (!event.active) simulation.alphaTarget(0.3).restart();
                                d.fx = d.x; d.fy = d.y;
                            })
                            .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                            .on('end', (event, d) => {
                                if (!event.active) simulation.alphaTarget(0);
                                d.fx = null; d.fy = null;
                            })
                    );

                // Lead nodes: gold circles
                node.filter(d => d.type === 'lead')
                    .append('circle')
                    .attr('r', 24)
                    .attr('fill', '#c8956c')
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 2.5)
                    .attr('opacity', 0.92);

                // Category nodes: teal rounded rects
                node.filter(d => d.type === 'category')
                    .append('rect')
                    .attr('x', -20).attr('y', -20)
                    .attr('width', 40).attr('height', 40)
                    .attr('rx', 7)
                    .attr('fill', '#1a6b5a')
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 2.5)
                    .attr('opacity', 0.88);

                // Labels
                node.append('text')
                    .text(d => d.name.length > 14 ? d.name.substring(0, 13) + '…' : d.name)
                    .attr('text-anchor', 'middle')
                    .attr('dy', d => d.type === 'lead' ? 38 : 36)
                    .attr('font-size', '11px')
                    .attr('fill', '#0a0f1a')
                    .attr('font-family', "'DM Sans', sans-serif")
                    .attr('font-weight', '500')
                    .attr('pointer-events', 'none');

                // Pulse ring on selected node
                node.append('circle')
                    .attr('r', d => d.type === 'lead' ? 30 : 0)
                    .attr('fill', 'none')
                    .attr('stroke', '#c8956c')
                    .attr('stroke-width', 2)
                    .attr('opacity', 0)
                    .attr('class', 'selection-ring');

                // Tick handler
                simulation.on('tick', () => {
                    link
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);
                    node.attr('transform', d => `translate(${d.x},${d.y})`);
                });

                return () => simulation.stop();
            }, [leads, categories]);

            const exportObsidianVault = () => {
                const JSZip = window.JSZip;
                if (!JSZip) { alert('JSZip not loaded. Please refresh.'); return; }
                const zip = new JSZip();
                const vault = zip.folder('whainow-vault');
                const leadsFolder = vault.folder('Leads');
                const catsFolder = vault.folder('Categories');

                // Category files
                categories.forEach(cat => {
                    const related = leads.filter(l => l.categories && l.categories.some(c => c.id === cat.id));
                    let md = `# ${cat.name}\n\n`;
                    md += `**Type:** Category  \n`;
                    md += `**Colour:** \`${cat.color || '#4a4a4a'}\`\n\n`;
                    md += `## Leads\n\n`;
                    if (related.length > 0) {
                        related.forEach(l => { md += `- [[${l.name}]]\n`; });
                    } else {
                        md += `*No leads in this category yet.*\n`;
                    }
                    catsFolder.file(`${cat.name}.md`, md);
                });

                // Lead files
                leads.forEach(lead => {
                    const cats = lead.categories || [];
                    const leadTasks = tasks.filter(t => t.lead_id === lead.id);
                    const tagList = ['lead', ...cats.map(c => c.name.toLowerCase().replace(/[\s/]+/g, '-'))].join(', ');

                    let md = `---\n`;
                    md += `name: "${lead.name}"\n`;
                    md += `status: ${lead.status || 'new'}\n`;
                    md += `priority: ${lead.priority || 5}\n`;
                    if (lead.email) md += `email: ${lead.email}\n`;
                    if (lead.phone) md += `phone: ${lead.phone}\n`;
                    if (lead.company) md += `company: "${lead.company}"\n`;
                    if (lead.follow_up_date) md += `follow_up: ${lead.follow_up_date}\n`;
                    md += `tags: [${tagList}]\n`;
                    md += `created: ${(lead.created_at || '').split('T')[0]}\n`;
                    md += `---\n\n`;
                    md += `# ${lead.name}\n\n`;
                    if (lead.notes) md += `> ${lead.notes}\n\n`;

                    if (cats.length > 0) {
                        md += `## Categories\n\n`;
                        cats.forEach(c => { md += `- [[${c.name}]]\n`; });
                        md += `\n`;
                    }

                    if (lead.email || lead.phone || lead.company) {
                        md += `## Contact\n\n`;
                        if (lead.email) md += `- **Email:** ${lead.email}\n`;
                        if (lead.phone) md += `- **Phone:** ${lead.phone}\n`;
                        if (lead.company) md += `- **Company:** ${lead.company}\n`;
                        md += `\n`;
                    }

                    if (leadTasks.length > 0) {
                        md += `## Tasks\n\n`;
                        leadTasks.forEach(t => {
                            const done = t.status === 'done';
                            md += `- [${done ? 'x' : ' '}] **${t.title}**`;
                            if (t.due_date) md += ` *(due: ${t.due_date})*`;
                            if (t.description) md += `\n  ${t.description}`;
                            md += `\n`;
                        });
                        md += `\n`;
                    }

                    leadsFolder.file(`${lead.name.replace(/[/\\:*?"<>|]/g, '_')}.md`, md);
                });

                // Index file
                const sorted = [...leads].sort((a, b) => (a.priority || 9) - (b.priority || 9));
                let idx = `# Whainow Outreach — Index\n\n`;
                idx += `> Exported ${new Date().toISOString().split('T')[0]} · ${leads.length} leads · ${categories.length} categories\n\n`;
                idx += `## Leads by Priority\n\n`;
                sorted.forEach(l => {
                    const cats = (l.categories || []).map(c => `[[${c.name}]]`).join(', ');
                    const statusIcon = { new: '🔵', contacted: '🟡', in_conversation: '🟢', committed: '✅', declined: '🔴', on_hold: '⏸' }[l.status] || '•';
                    idx += `${l.priority}. ${statusIcon} [[${l.name}]]${cats ? ` — ${cats}` : ''}\n`;
                });
                idx += `\n## Categories\n\n`;
                categories.forEach(c => { idx += `- [[${c.name}]]\n`; });
                idx += `\n---\n*Generated by [Whainow CRM](https://data.whainow.com)*\n`;
                vault.file('_Index.md', idx);

                zip.generateAsync({ type: 'blob' }).then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `whainow-vault-${new Date().toISOString().split('T')[0]}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            };

            return (
                <div className="tab-content">
                    <div className="graph-header">
                        <div>
                            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: '1.8rem', fontWeight: 400, marginBottom: '0.5rem' }}>
                                Relationship Graph
                            </h2>
                            <div className="graph-legend">
                                <div className="graph-legend-item">
                                    <div className="legend-dot" style={{ background: '#c8956c' }}></div>
                                    <span>Lead</span>
                                </div>
                                <div className="graph-legend-item">
                                    <div className="legend-square" style={{ background: '#1a6b5a' }}></div>
                                    <span>Category</span>
                                </div>
                                <span style={{ color: 'var(--grey-light)' }}>· Click to inspect · Drag to rearrange · Scroll to zoom</span>
                            </div>
                        </div>
                        <button className="obsidian-btn" onClick={exportObsidianVault}>
                            ⬦ Export Obsidian Vault
                        </button>
                    </div>

                    <div className="graph-layout">
                        <div className="graph-container">
                            <svg ref={svgRef}></svg>
                            {leads.length === 0 && (
                                <div className="graph-empty">
                                    <div style={{ fontSize: '2.5rem', opacity: 0.3 }}>◎</div>
                                    <p style={{ fontSize: '0.9rem' }}>Add leads to see the relationship graph</p>
                                </div>
                            )}
                        </div>

                        {selectedNode && (
                            <div className="graph-sidebar">
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <span className={`graph-node-label ${selectedNode.type}`}>
                                        {selectedNode.type}
                                    </span>
                                    <button
                                        onClick={() => setSelectedNode(null)}
                                        style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.3rem', color: 'var(--grey)', lineHeight: 1, padding: '0 0.25rem' }}
                                    >×</button>
                                </div>

                                <h3 style={{ fontFamily: "'Instrument Serif', serif", fontSize: '1.35rem', fontWeight: 400, marginBottom: '1.25rem', lineHeight: 1.3 }}>
                                    {selectedNode.name}
                                </h3>

                                {selectedNode.type === 'lead' && selectedNode.data && (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.9rem', fontSize: '0.85rem' }}>
                                        <div>
                                            <div style={{ color: 'var(--grey)', fontWeight: 600, textTransform: 'uppercase', fontSize: '0.68rem', letterSpacing: '0.06em', marginBottom: '0.3rem' }}>Status</div>
                                            <span className={`status-badge status-${selectedNode.data.status}`}>
                                                {(selectedNode.data.status || 'new').replace('_', ' ')}
                                            </span>
                                        </div>
                                        {selectedNode.data.notes && (
                                            <div>
                                                <div style={{ color: 'var(--grey)', fontWeight: 600, textTransform: 'uppercase', fontSize: '0.68rem', letterSpacing: '0.06em', marginBottom: '0.3rem' }}>Notes</div>
                                                <p style={{ fontStyle: 'italic', color: 'var(--ink)', lineHeight: 1.55, borderLeft: '2px solid var(--warm)', paddingLeft: '0.6rem' }}>
                                                    {selectedNode.data.notes}
                                                </p>
                                            </div>
                                        )}
                                        {selectedNode.data.categories && selectedNode.data.categories.length > 0 && (
                                            <div>
                                                <div style={{ color: 'var(--grey)', fontWeight: 600, textTransform: 'uppercase', fontSize: '0.68rem', letterSpacing: '0.06em', marginBottom: '0.4rem' }}>Categories</div>
                                                <div style={{ display: 'flex', gap: '0.35rem', flexWrap: 'wrap' }}>
                                                    {selectedNode.data.categories.map(c => (
                                                        <span key={c.id} style={{ padding: '0.2rem 0.55rem', borderRadius: '3px', background: 'var(--warm)', fontSize: '0.75rem', fontWeight: 500 }}>
                                                            {c.name}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {selectedNode.data.follow_up_date && (
                                            <div>
                                                <div style={{ color: 'var(--grey)', fontWeight: 600, textTransform: 'uppercase', fontSize: '0.68rem', letterSpacing: '0.06em', marginBottom: '0.3rem' }}>Follow-up</div>
                                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.8rem' }}>{selectedNode.data.follow_up_date}</span>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {selectedNode.type === 'category' && (
                                    <div style={{ fontSize: '0.85rem' }}>
                                        <div style={{ color: 'var(--grey)', fontWeight: 600, textTransform: 'uppercase', fontSize: '0.68rem', letterSpacing: '0.06em', marginBottom: '0.5rem' }}>Connected Leads</div>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '0' }}>
                                            {leads.filter(l => l.categories && l.categories.some(c => c.id === selectedNode.data.id)).map((l, i, arr) => (
                                                <div key={l.id} style={{
                                                    padding: '0.5rem 0',
                                                    borderBottom: i < arr.length - 1 ? '1px solid var(--warm)' : 'none',
                                                    display: 'flex',
                                                    justifyContent: 'space-between',
                                                    alignItems: 'center'
                                                }}>
                                                    <span style={{ color: 'var(--ink)', fontWeight: 500 }}>{l.name}</span>
                                                    <span className={`status-badge status-${l.status}`} style={{ fontSize: '0.65rem', padding: '0.15rem 0.4rem' }}>
                                                        {(l.status || 'new').replace('_', ' ')}
                                                    </span>
                                                </div>
                                            ))}
                                            {leads.filter(l => l.categories && l.categories.some(c => c.id === selectedNode.data.id)).length === 0 && (
                                                <p style={{ color: 'var(--grey-light)', fontStyle: 'italic', fontSize: '0.8rem' }}>No leads in this category</p>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AppWithAuth = () => {
            const [authenticated, setAuthenticated] = useState(getCookie(COOKIE_NAME) === 'authenticated');

            if (!authenticated) {
                return <PasswordGate onAuthenticated={() => setAuthenticated(true)} />;
            }

            return <App />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [leads, setLeads] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [documents, setDocuments] = useState([]);
            const [categories, setCategories] = useState([]);
            const [principals, setPrincipals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [toasts, setToasts] = useState([]);

            const loadData = async () => {
                try {
                    setLoading(true);

                    // Load categories
                    const { data: categoriesData, error: catError } = await supabaseClient
                        .from('whainow_categories')
                        .select('*');
                    if (catError) throw catError;
                    setCategories(categoriesData || []);

                    // Load principals
                    const { data: principalsData, error: prinError } = await supabaseClient
                        .from('whainow_principals')
                        .select('*');
                    if (prinError) throw prinError;
                    setPrincipals(principalsData || []);

                    // Load leads
                    const { data: leadsData, error: leadError } = await supabaseClient
                        .from('whainow_leads')
                        .select('*');
                    if (leadError) throw leadError;

                    // Load lead categories for each lead
                    const leadsWithCategories = await Promise.all(
                        (leadsData || []).map(async (lead) => {
                            const { data: catData, error: catErr } = await supabaseClient
                                .from('whainow_lead_categories')
                                .select('category_id, whainow_categories(id, name)')
                                .eq('lead_id', lead.id);

                            if (!catErr && catData) {
                                lead.categories = catData
                                    .filter(item => item.whainow_categories)
                                    .map(item => item.whainow_categories);
                            } else {
                                lead.categories = [];
                            }
                            return lead;
                        })
                    );
                    setLeads(leadsWithCategories || []);

                    // Load tasks
                    const { data: tasksData, error: taskError } = await supabaseClient
                        .from('whainow_tasks')
                        .select('*');
                    if (taskError) throw taskError;
                    setTasks(tasksData || []);

                    // Load documents
                    const { data: docsData, error: docsError } = await supabaseClient
                        .from('whainow_documents')
                        .select('*');
                    if (docsError) throw docsError;
                    setDocuments(docsData || []);

                    showToast('Data loaded successfully', 'success');
                } catch (error) {
                    console.error('Error loading data:', error);
                    showToast('Error loading data', 'error');
                }
                setLoading(false);
            };

            const showToast = (message, type = 'success') => {
                const id = Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const removeToast = (idx) => {
                setToasts(prev => prev.filter((_, i) => i !== idx));
            };

            useEffect(() => {
                loadData();
            }, []);

            if (loading) {
                return (
                    <div className="app-container">
                        <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh' }}>
                            <div className="spinner"></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <div className="app-header">
                        <h1>whainow</h1>
                        <div className="subtitle">Outreach Pipeline</div>
                    </div>

                    <div className="tabs-wrapper">
                        <div className="tab-navigation">
                            <button
                                className={`tab-button ${activeTab === 'dashboard' ? 'active' : ''}`}
                                onClick={() => setActiveTab('dashboard')}
                            >
                                Dashboard
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'add-lead' ? 'active' : ''}`}
                                onClick={() => setActiveTab('add-lead')}
                            >
                                Add Lead
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'all-leads' ? 'active' : ''}`}
                                onClick={() => setActiveTab('all-leads')}
                            >
                                All Leads
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'tasks' ? 'active' : ''}`}
                                onClick={() => setActiveTab('tasks')}
                            >
                                Tasks
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'documents' ? 'active' : ''}`}
                                onClick={() => setActiveTab('documents')}
                            >
                                Documents
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'graph' ? 'active' : ''}`}
                                onClick={() => setActiveTab('graph')}
                            >
                                Graph
                            </button>
                        </div>

                        {activeTab === 'dashboard' && (
                            <Dashboard leads={leads} tasks={tasks} categories={categories} principals={principals} />
                        )}
                        {activeTab === 'add-lead' && (
                            <AddLead categories={categories} principals={principals} onLeadAdded={loadData} />
                        )}
                        {activeTab === 'all-leads' && (
                            <AllLeads leads={leads} categories={categories} principals={principals} onDataUpdated={loadData} />
                        )}
                        {activeTab === 'tasks' && (
                            <Tasks tasks={tasks} leads={leads} categories={categories} principals={principals} onDataUpdated={loadData} />
                        )}
                        {activeTab === 'documents' && (
                            <Documents documents={documents} leads={leads} onDataUpdated={loadData} />
                        )}
                        {activeTab === 'graph' && (
                            <GraphView leads={leads} categories={categories} tasks={tasks} />
                        )}
                    </div>

                    <ToastContainer toasts={toasts} onRemove={removeToast} />
                </div>
            );
        };

        ReactDOM.render(<AppWithAuth />, document.getElementById('root'));
    </script>
</body>
</html>
