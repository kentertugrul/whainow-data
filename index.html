<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whainow Outreach CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0f1a;
            --paper: #f6f2ec;
            --warm: #e8e0d4;
            --accent: #c8956c;
            --accent-dark: #a06b3c;
            --teal: #1a6b5a;
            --teal-light: #e8f5f0;
            --grey: #6b6560;
            --grey-light: #b5afa8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            line-height: 1.6;
        }

        #root {
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .app-header {
            background-color: var(--ink);
            color: var(--paper);
            padding: 2rem;
            border-bottom: 1px solid rgba(248, 242, 236, 0.1);
        }

        .app-header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .app-header .subtitle {
            font-size: 0.95rem;
            color: rgba(248, 242, 236, 0.7);
            font-weight: 300;
        }

        .tab-navigation {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--warm);
            background-color: var(--paper);
        }

        .tab-button {
            flex: 1;
            padding: 1rem;
            text-align: center;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--grey);
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .tab-button:hover {
            color: var(--ink);
        }

        .tab-button.active {
            color: var(--ink);
            border-bottom-color: var(--accent);
        }

        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .view-title {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--ink);
        }

        .section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon {
            font-size: 1.2em;
        }

        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .lead-card {
            background: white;
            border: 1px solid var(--warm);
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .lead-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(200, 149, 108, 0.15);
        }

        .lead-card.selected {
            border-color: var(--accent);
            background-color: var(--teal-light);
        }

        .lead-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .lead-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
        }

        .lead-status {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-prospect {
            background-color: #fef3c7;
            color: #92400e;
        }

        .status-lead {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .status-customer {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-inactive {
            background-color: var(--warm);
            color: var(--grey);
        }

        .lead-info {
            font-size: 0.9rem;
            color: var(--grey);
            margin-bottom: 0.5rem;
        }

        .lead-value {
            font-weight: 600;
            color: var(--ink);
        }

        .lead-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background-color: var(--warm);
            color: var(--ink);
            border-radius: 4px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--grey);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(10, 15, 26, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--warm);
            padding-bottom: 1rem;
        }

        .modal-title {
            font-family: 'Instrument Serif', serif;
            font-size: 1.5rem;
            font-weight: 400;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--grey);
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--ink);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--ink);
            font-size: 0.95rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--warm);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200, 149, 108, 0.1);
        }

        .form-button-group {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .button-primary {
            background-color: var(--accent);
            color: white;
        }

        .button-primary:hover {
            background-color: var(--accent-dark);
        }

        .button-secondary {
            background-color: var(--warm);
            color: var(--ink);
        }

        .button-secondary:hover {
            background-color: #ddd0c8;
        }

        .button-danger {
            background-color: #dc2626;
            color: white;
        }

        .button-danger:hover {
            background-color: #b91c1c;
        }

        .button-small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid var(--warm);
            border-radius: 8px;
            overflow: hidden;
        }

        .table thead {
            background-color: var(--warm);
        }

        .table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--ink);
            border-bottom: 1px solid var(--warm);
        }

        .table td {
            padding: 1rem;
            border-bottom: 1px solid var(--warm);
        }

        .table tbody tr:hover {
            background-color: var(--teal-light);
        }

        .table-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chart-container {
            background: white;
            border: 1px solid var(--warm);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--warm);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--grey);
            font-weight: 500;
        }

        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--paper);
        }

        .auth-card {
            background: white;
            border: 1px solid var(--warm);
            border-radius: 12px;
            padding: 3rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .auth-title {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--grey);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .auth-form-group {
            margin-bottom: 1.5rem;
        }

        .auth-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--warm);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .auth-button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .auth-button:hover {
            background-color: var(--accent-dark);
        }

        .hidden {
            display: none !important;
        }

        .graph-container {
            background: white;
            border: 1px solid var(--warm);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .graph-svg {
            min-height: 500px;
            width: 100%;
        }

        svg text {
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
        }

        .filter-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-label {
            font-weight: 600;
            color: var(--ink);
            font-size: 0.9rem;
        }

        .search-input {
            padding: 0.75rem 1rem;
            border: 1px solid var(--warm);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            width: 250px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .sort-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .sort-button {
            padding: 0.5rem 1rem;
            background-color: var(--warm);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .sort-button.active {
            background-color: var(--accent);
            color: white;
        }

        .sort-button:hover {
            background-color: #ddd0c8;
        }

        .edit-button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            font-size: 0.9rem;
        }

        .edit-button:hover {
            color: var(--accent-dark);
        }

        .delete-button {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            font-size: 0.9rem;
        }

        .delete-button:hover {
            color: #b91c1c;
        }

        .textarea-field {
            font-family: 'JetBrains Mono', monospace;
        }

        .export-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .export-button {
            padding: 1rem;
            background-color: var(--warm);
            border: 1px solid var(--warm);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .export-button:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .success-message {
            background-color: #dcfce7;
            color: #166534;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .error-message {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .textarea-with-copy {
            position: relative;
        }

        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .copy-button:hover {
            background-color: var(--accent-dark);
        }

        .textarea-with-copy textarea {
            padding-right: 5rem;
        }

        .field-label-with-tooltip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tooltip-icon {
            cursor: help;
            color: var(--grey);
            font-weight: bold;
        }

        .tooltip-icon:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .leads-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .export-options {
                grid-template-columns: 1fr;
            }

            .modal {
                width: 95%;
                padding: 1.5rem;
            }

            .app-header h1 {
                font-size: 1.8rem;
            }

            .view-title {
                font-size: 1.5rem;
            }

            .search-input {
                width: 100%;
            }

            .header-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons {
                flex-direction: column;
            }

            .button,
            .button-primary,
            .button-secondary {
                width: 100%;
            }

            .filter-controls {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>
        // Simple localStorage wrapper for data persistence
        const DataStore = {
            get: function(key) {
                try {
                    return JSON.parse(localStorage.getItem(key) || '{}');
                } catch (e) {
                    return {};
                }
            },
            set: function(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                } catch (e) {
                    console.error('Storage error:', e);
                }
            }
        };

        const { useState, useEffect, useRef } = React;

        // Auth Component
        function Auth({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (email && password) {
                    const userData = { email, name: email.split('@')[0] };
                    DataStore.set('auth', userData);
                    onLogin(userData);
                }
            };

            return React.createElement('div', { className: 'auth-container' },
                React.createElement('div', { className: 'auth-card' },
                    React.createElement('h1', { className: 'auth-title' }, 'Whainow'),
                    React.createElement('p', { className: 'auth-subtitle' }, 'CRM Outreach'),
                    React.createElement('form', { onSubmit: handleSubmit },
                        React.createElement('div', { className: 'auth-form-group' },
                            React.createElement('input', {
                                type: 'email',
                                className: 'auth-input',
                                placeholder: 'Email',
                                value: email,
                                onChange: (e) => setEmail(e.target.value),
                                required: true
                            })
                        ),
                        React.createElement('div', { className: 'auth-form-group' },
                            React.createElement('input', {
                                type: 'password',
                                className: 'auth-input',
                                placeholder: 'Password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                required: true
                            })
                        ),
                        React.createElement('button', {
                            type: 'submit',
                            className: 'auth-button'
                        }, 'Sign In')
                    )
                )
            );
        }

        // Modal Component
        function Modal({ isOpen, onClose, children }) {
            return React.createElement('div', { className: `modal-overlay ${isOpen ? 'active' : ''}` },
                React.createElement('div', { className: 'modal' },
                    React.createElement('button', {
                        className: 'modal-close',
                        onClick: onClose
                    }, '✕'),
                    children
                )
            );
        }

        // Lead Form Component
        function LeadForm({ lead, onSubmit, onCancel }) {
            const [formData, setFormData] = useState(lead || {
                name: '',
                company: '',
                email: '',
                phone: '',
                status: 'prospect',
                value: '',
                notes: '',
                source: '',
                industry: '',
                size: '',
                website: '',
                lastContact: '',
                nextFollowUp: '',
                tags: ''
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return React.createElement('form', { onSubmit: handleSubmit },
                React.createElement('div', { className: 'modal-header' },
                    React.createElement('h2', { className: 'modal-title' }, 
                        lead ? 'Edit Lead' : 'New Lead'
                    ),
                    React.createElement('button', {
                        type: 'button',
                        className: 'modal-close',
                        onClick: onCancel
                    }, '✕')
                ),
                React.createElement('div', {},
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Name *'),
                        React.createElement('input', {
                            type: 'text',
                            name: 'name',
                            className: 'form-input',
                            value: formData.name,
                            onChange: handleChange,
                            required: true
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Company'),
                        React.createElement('input', {
                            type: 'text',
                            name: 'company',
                            className: 'form-input',
                            value: formData.company,
                            onChange: handleChange
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Email'),
                        React.createElement('input', {
                            type: 'email',
                            name: 'email',
                            className: 'form-input',
                            value: formData.email,
                            onChange: handleChange
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Phone'),
                        React.createElement('input', {
                            type: 'tel',
                            name: 'phone',
                            className: 'form-input',
                            value: formData.phone,
                            onChange: handleChange
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Status'),
                        React.createElement('select', {
                            name: 'status',
                            className: 'form-select',
                            value: formData.status,
                            onChange: handleChange
                        },
                            React.createElement('option', { value: 'prospect' }, 'Prospect'),
                            React.createElement('option', { value: 'lead' }, 'Lead'),
                            React.createElement('option', { value: 'customer' }, 'Customer'),
                            React.createElement('option', { value: 'inactive' }, 'Inactive')
                        )
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Deal Value ($)'),
                        React.createElement('input', {
                            type: 'number',
                            name: 'value',
                            className: 'form-input',
                            value: formData.value,
                            onChange: handleChange
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Industry'),
                        React.createElement('input', {
                            type: 'text',
                            name: 'industry',
                            className: 'form-input',
                            value: formData.industry,
                            onChange: handleChange
                        })
                    ),
                    React.createElement('div', { className: 'form-group' },
                        React.createElement('label', { className: 'form-label' }, 'Company Size'),
                        React.createElement('select', {
                            name: 'size',
                            className: 'form-select',

        // Graph View Component
        function GraphView({ leads }) {
            const svgRef = useRef(null);

            useEffect(() => {
                if (!svgRef.current || leads.length === 0) return;

                d3.select(svgRef.current).selectAll("*").remove();

                const width = 800;
                const height = 600;

                const nodes = [
                    { id: 'center', label: 'All Leads', x: width / 2, y: height / 2, type: 'center' }
                ];

                const statusGroups = {};
                leads.forEach(lead => {
                    if (!statusGroups[lead.status]) {
                        statusGroups[lead.status] = [];
                    }
                    statusGroups[lead.status].push(lead);
                });

                let nodeId = 1;
                const links = [];

                Object.keys(statusGroups).forEach((status, idx) => {
                    const angle = (idx / Object.keys(statusGroups).length) * 2 * Math.PI;
                    const x = width / 2 + 200 * Math.cos(angle);
                    const y = height / 2 + 200 * Math.sin(angle);

                    const statusNodeId = `status-${nodeId}`;
                    nodes.push({
                        id: statusNodeId,
                        label: `${status.charAt(0).toUpperCase() + status.slice(1)} (${statusGroups[status].length})`,
                        x: x,
                        y: y,
                        type: 'status'
                    });

                    links.push({ source: 'center', target: statusNodeId });

                    statusGroups[status].forEach((lead, leadIdx) => {
                        const leadAngle = (leadIdx / statusGroups[status].length) * 2 * Math.PI;
                        const leadX = x + 120 * Math.cos(leadAngle);
                        const leadY = y + 120 * Math.sin(leadAngle);

                        const leadNodeId = `lead-${nodeId}`;
                        nodes.push({
                            id: leadNodeId,
                            label: lead.name.substring(0, 15),
                            x: leadX,
                            y: leadY,
                            type: 'lead'
                        });

                        links.push({ source: statusNodeId, target: leadNodeId });
                        nodeId++;
                    });
                });

                const svg = d3.select(svgRef.current)
                    .attr('width', width)
                    .attr('height', height);

                // Draw links
                svg.selectAll('.link')
                    .data(links)
                    .enter()
                    .append('line')
                    .attr('class', 'link')
                    .attr('x1', d => {
                        const source = nodes.find(n => n.id === d.source);
                        return source ? source.x : 0;
                    })
                    .attr('y1', d => {
                        const source = nodes.find(n => n.id === d.source);
                        return source ? source.y : 0;
                    })
                    .attr('x2', d => {
                        const target = nodes.find(n => n.id === d.target);
                        return target ? target.x : 0;
                    })
                    .attr('y2', d => {
                        const target = nodes.find(n => n.id === d.target);
                        return target ? target.y : 0;
                    })
                    .attr('stroke', '#ddd')
                    .attr('stroke-width', 2);

                // Draw nodes
                const nodeGroups = svg.selectAll('.node')
                    .data(nodes)
                    .enter()
                    .append('g')
                    .attr('class', 'node')
                    .attr('transform', d => `translate(${d.x},${d.y})`);

                nodeGroups.append('circle')
                    .attr('r', d => d.type === 'center' ? 30 : (d.type === 'status' ? 25 : 15))
                    .attr('fill', d => {
                        if (d.type === 'center') return '#c8956c';
                        if (d.type === 'status') return '#1a6b5a';
                        return '#e8e0d4';
                    })
                    .attr('stroke', '#0a0f1a')
                    .attr('stroke-width', 2);

                nodeGroups.append('text')
                    .attr('text-anchor', 'middle')
                    .attr('dy', '.3em')
                    .attr('font-size', d => d.type === 'center' ? '11px' : '9px')
                    .attr('font-weight', 'bold')
                    .attr('fill', d => d.type === 'lead' ? '#0a0f1a' : 'white')
                    .text(d => d.label)
                    .style('pointer-events', 'none');

            }, [leads]);

            return React.createElement('div', {},
                React.createElement('h2', { className: 'view-title' }, 'Graph View'),
                React.createElement('div', { className: 'graph-container' },
                    React.createElement('svg', { ref: svgRef, className: 'graph-svg' })
                )
            );
        }

        // Export View Component
        function ExportView({ leads, userData }) {
            const [exportFormat, setExportFormat] = useState(null);
            const [message, setMessage] = useState('');

            const generateCSV = () => {
                const headers = ['Name', 'Company', 'Email', 'Phone', 'Status', 'Value', 'Industry', 'Source', 'Last Contact', 'Next Follow-up', 'Notes'];
                const rows = leads.map(lead => [
                    lead.name,
                    lead.company || '',
                    lead.email || '',
                    lead.phone || '',
                    lead.status || '',
                    lead.value || '',
                    lead.industry || '',
                    lead.source || '',
                    lead.lastContact || '',
                    lead.nextFollowUp || '',
                    (lead.notes || '').replace(/"/g, '""')
                ]);

                const csv = [headers.map(h => `"${h}"`).join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
                return csv;
            };

            const generateJSON = () => {
                return JSON.stringify(leads, null, 2);
            };

            const generateMarkdown = () => {
                let markdown = '# Lead Database\n\n';
                markdown += `Generated: ${new Date().toLocaleString()}\n\n`;

                const statusGroups = {};
                leads.forEach(lead => {
                    if (!statusGroups[lead.status]) {
                        statusGroups[lead.status] = [];
                    }
                    statusGroups[lead.status].push(lead);
                });

                Object.keys(statusGroups).forEach(status => {
                    markdown += `## ${status.charAt(0).toUpperCase() + status.slice(1)}\n\n`;
                    statusGroups[status].forEach(lead => {
                        markdown += `### ${lead.name}\n`;
                        if (lead.company) markdown += `- **Company**: ${lead.company}\n`;
                        if (lead.email) markdown += `- **Email**: ${lead.email}\n`;
                        if (lead.phone) markdown += `- **Phone**: ${lead.phone}\n`;
                        if (lead.value) markdown += `- **Value**: $${lead.value}\n`;
                        if (lead.industry) markdown += `- **Industry**: ${lead.industry}\n`;
                        if (lead.source) markdown += `- **Source**: ${lead.source}\n`;
                        if (lead.lastContact) markdown += `- **Last Contact**: ${lead.lastContact}\n`;
                        if (lead.nextFollowUp) markdown += `- **Next Follow-up**: ${lead.nextFollowUp}\n`;
                        if (lead.notes) markdown += `- **Notes**: ${lead.notes}\n`;
                        markdown += '\n';
                    });
                });

                return markdown;
            };

            const generateObsidian = () => {
                let obsidian = `# Whainow CRM Export\n\n`;
                obsidian += `Exported: ${new Date().toLocaleString()}\n`;
                obsidian += `User: ${userData.name}\n\n`;

                obsidian += `## Summary\n`;
                obsidian += `- Total Leads: ${leads.length}\n`;
                obsidian += `- Prospects: ${leads.filter(l => l.status === 'prospect').length}\n`;
                obsidian += `- Leads: ${leads.filter(l => l.status === 'lead').length}\n`;
                obsidian += `- Customers: ${leads.filter(l => l.status === 'customer').length}\n\n`;

                obsidian += `## Leads by Status\n\n`;

                const statusGroups = {};
                leads.forEach(lead => {
                    if (!statusGroups[lead.status]) {
                        statusGroups[lead.status] = [];
                    }
                    statusGroups[lead.status].push(lead);
                });

                Object.keys(statusGroups).forEach(status => {
                    obsidian += `### ${status.charAt(0).toUpperCase() + status.slice(1)}\n\n`;
                    statusGroups[status].forEach(lead => {
                        obsidian += `#### ${lead.name}\n`;
                        obsidian += `#lead-${lead.status} #source-${lead.source || 'unknown'}\n\n`;
                        if (lead.company) obsidian += `**Company**: ${lead.company}\n`;
                        if (lead.email) obsidian += `**Email**: [${lead.email}](mailto:${lead.email})\n`;
                        if (lead.phone) obsidian += `**Phone**: ${lead.phone}\n`;
                        if (lead.value) obsidian += `**Deal Value**: $${lead.value}\n`;
                        if (lead.industry) obsidian += `**Industry**: ${lead.industry}\n`;
                        if (lead.size) obsidian += `**Company Size**: ${lead.size}\n`;
                        if (lead.website) obsidian += `**Website**: [${lead.website}](${lead.website})\n`;
                        if (lead.source) obsidian += `**Source**: ${lead.source}\n`;
                        if (lead.lastContact) obsidian += `**Last Contact**: ${lead.lastContact}\n`;
                        if (lead.nextFollowUp) obsidian += `**Next Follow-up**: ${lead.nextFollowUp}\n`;
                        if (lead.tags) obsidian += `**Tags**: ${lead.tags}\n`;
                        if (lead.notes) obsidian += `**Notes**: ${lead.notes}\n`;
                        obsidian += `\n---\n\n`;
                    });
                });

                return obsidian;
            };

            const handleExport = (format) => {
                let content = '';
                let filename = '';
                let mimeType = '';

                if (format === 'csv') {
                    content = generateCSV();
                    filename = 'leads.csv';
                    mimeType = 'text/csv';
                } else if (format === 'json') {
                    content = generateJSON();
                    filename = 'leads.json';
                    mimeType = 'application/json';
                } else if (format === 'markdown') {
                    content = generateMarkdown();
                    filename = 'leads.md';
                    mimeType = 'text/markdown';
                } else if (format === 'obsidian') {
                    content = generateObsidian();
                    filename = 'leads.md';
                    mimeType = 'text/markdown';
                }

                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                setExportFormat(format);
                setMessage(`✓ Exported as ${format.toUpperCase()} (${filename})`);
                setTimeout(() => setMessage(''), 3000);
            };

            return React.createElement('div', {},
                React.createElement('h2', { className: 'view-title' }, 'Export Data'),
                message && React.createElement('div', { className: 'success-message' }, message),
                React.createElement('div', { className: 'section' },
                    React.createElement('h3', { className: 'section-title' }, 'Choose Export Format'),
                    React.createElement('p', { style: { color: '#6b6560', marginBottom: '1.5rem' } },
                        `Export your ${leads.length} leads in your preferred format.`
                    ),
                    React.createElement('div', { className: 'export-options' },
                        React.createElement('button', {
                            className: 'export-button',
                            onClick: () => handleExport('csv')
                        },
                            React.createElement('div', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } }, '📊'),
                            'CSV (Excel)'
                        ),
                        React.createElement('button', {
                            className: 'export-button',
                            onClick: () => handleExport('json')
                        },
                            React.createElement('div', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } }, '{ }'),
                            'JSON'
                        ),
                        React.createElement('button', {
                            className: 'export-button',
                            onClick: () => handleExport('markdown')
                        },
                            React.createElement('div', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } }, '📝'),
                            'Markdown'
                        ),
                        React.createElement('button', {
                            className: 'export-button',
                            onClick: () => handleExport('obsidian')
                        },
                            React.createElement('div', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } }, '🧠'),
                            'Obsidian'
                        )
                    )
                )
            );
        }

                const savedLeads = DataStore.get('leads');
                if (Object.keys(savedLeads).length > 0) {
                    setLeads(Object.values(savedLeads));
                } else {
                    setLeads([]);
                }

                const auth = DataStore.get('auth');
                if (auth && auth.email) {
                    setUserData(auth);
                }
            }, []);

            const handleAddLead = () => {
                setSelectedLead(null);
                setSelectedIndex(null);
                setShowModal(true);
            };

            const handleEditLead = (lead, index) => {
                setSelectedLead(lead);
                setSelectedIndex(index);
                setShowModal(true);
            };

            const handleSaveLead = (formData) => {
                if (selectedIndex !== null) {
                    const updatedLeads = [...leads];
                    updatedLeads[selectedIndex] = formData;
                    setLeads(updatedLeads);
                    const leadsObj = updatedLeads.reduce((acc, lead, idx) => {
                        acc[idx] = lead;
                        return acc;
                    }, {});
                    DataStore.set('leads', leadsObj);
                } else {
                    const newLeads = [...leads, formData];
                    setLeads(newLeads);
                    const leadsObj = newLeads.reduce((acc, lead, idx) => {
                        acc[idx] = lead;
                        return acc;
                    }, {});
                    DataStore.set('leads', leadsObj);
                }
                setShowModal(false);
            };

            const handleDeleteLead = (index) => {
                const updatedLeads = leads.filter((_, i) => i !== index);
                setLeads(updatedLeads);
                const leadsObj = updatedLeads.reduce((acc, lead, idx) => {
                    acc[idx] = lead;
                    return acc;
                }, {});
                DataStore.set('leads', leadsObj);
            };

            return React.createElement('div', { className: 'app-container' },
                React.createElement('header', { className: 'app-header' },
                    React.createElement('h1', {}, 'Whainow'),
                    React.createElement('p', { className: 'subtitle' }, 'Outreach CRM')
                ),
                React.createElement('nav', { className: 'tab-navigation' },
                    React.createElement('button', {
                        className: `tab-button ${currentTab === 'leads' ? 'active' : ''}`,
                        onClick: () => setCurrentTab('leads')
                    }, '📋 Leads'),
                    React.createElement('button', {
                        className: `tab-button ${currentTab === 'analytics' ? 'active' : ''}`,
                        onClick: () => setCurrentTab('analytics')
                    }, '📊 Analytics'),
                    React.createElement('button', {
                        className: `tab-button ${currentTab === 'graph' ? 'active' : ''}`,
                        onClick: () => setCurrentTab('graph')
                    }, '🔗 Graph View'),
                    React.createElement('button', {
                        className: `tab-button ${currentTab === 'export' ? 'active' : ''}`,
                        onClick: () => setCurrentTab('export')
                    }, '💾 Export')
                ),
                React.createElement('div', { className: 'content' },
                    currentTab === 'leads' && React.createElement(LeadsView, {
                        leads: leads,
                        onAddLead: handleAddLead,
                        onEditLead: handleEditLead,
                        onDeleteLead: handleDeleteLead
                    }),
                    currentTab === 'analytics' && React.createElement(AnalyticsView, { leads: leads }),
                    currentTab === 'graph' && React.createElement(GraphView, { leads: leads }),
                    currentTab === 'export' && React.createElement(ExportView, { leads: leads, userData: userData })
                ),
                React.createElement(Modal, {
                    isOpen: showModal,
                    onClose: () => setShowModal(false)
                },
                    React.createElement(LeadForm, {
                        lead: selectedLead,
                        onSubmit: handleSaveLead,
                        onCancel: () => setShowModal(false)
                    })
                )
            );
        }

        // Auth wrapper component
        function AppWithAuth() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const savedAuth = DataStore.get('auth');
                if (savedAuth && savedAuth.email) {
                    setUser(savedAuth);
                }
                setLoading(false);
            }, []);

            if (loading) {
                return React.createElement('div', {
                    style: {
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        height: '100vh',
                        fontFamily: 'DM Sans, sans-serif'
                    }
                }, 'Loading...');
            }

            return user
                ? React.createElement(App)
                : React.createElement(Auth, { onLogin: (userData) => setUser(userData) });
        }

        ReactDOM.render(<AppWithAuth />, document.getElementById('root'));
    </script>
</body>
</html>
